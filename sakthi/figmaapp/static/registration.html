<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>Event Registration</title>
</head>
<body>

<div class="container">

    <div class="form-card">

        <h1>EVENT REGISTRATION</h1>

        <form>

            <input type="text" placeholder="Full Name">

            <select>
                <option>Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <input type="number" placeholder="Age">

            <input type="text" placeholder="Register Number">

            <input type="text" placeholder="Department">

            <input type="tel" placeholder="Mobile Number">

            <input type="email" placeholder="Email ID">

            <select>
                <option>Select Event</option>
                <option>Red Dead Redemption 2</option>
                <option>Grand Theft Auto V</option>
                <option>God of War</option>
                <option>Assassin's Creed Shadows</option>
                <option>Ghost of Yotei</option>
            </select>

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</div>

</body>
</html>
